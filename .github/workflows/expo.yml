name: Expo Smoke Test

on:
  push:
    branches: [ main, next ]
    paths: [ '.github/**', 'js/**' ]
  pull_request:
    branches: [ main, next ]
    paths: [ '.github/**', 'js/**' ]
  release:
    types: [ published ]

jobs:
  expo-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        version: [ 52, 53, 54, latest]

    steps:
      - uses: actions/checkout@v6

      - name: set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: pnpm/action-setup@v5
        with:
          cache: true
          cache_dependency_path: 'js/pnpm-lock.yaml'
          package_json_file: 'js/package.json'

      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: 'Build Project'
        working-directory: 'js/'
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: 'Expo Build'
        working-directory: 'js/'
        run: |
          if [ "${{ matrix.version }}" = "latest" ]; then
            npx -y create-expo-app expo-${{ matrix.version }}-app --template blank
          else
            npx -y create-expo-app expo-${{ matrix.version }}-app --template blank@sdk-${{ matrix.version }}
          fi
          cd expo-${{ matrix.version }}-app
          npm install file:../packages/seed-vault
          npx expo prebuild --no-install
          cd android && ./gradlew assembleDebug --no-daemon --stacktrace